    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();

    /* ── Scroll Reveal ── */
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          revealObserver.unobserve(e.target);
        }
      });
    }, { threshold: 0.10, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
 
    /* ── Nav Scroll Spy ── */
    const navLinks = document.querySelectorAll('.nav-links a[href^="#"]');
    const spySections = [...navLinks].map(a => document.querySelector(a.getAttribute('href'))).filter(Boolean);
    const navObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navLinks.forEach(a => a.classList.remove('active'));
          const link = document.querySelector('.nav-links a[href="#' + entry.target.id + '"]');
          if (link) link.classList.add('active');
        }
      });
    }, { threshold: 0.25, rootMargin: '-80px 0px -50% 0px' });
    spySections.forEach(s => navObserver.observe(s));
 
    /* ── Topbar Shadow on Scroll ── */
    const topbar = document.querySelector('.topbar');
    const backToTop = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => {
      topbar.classList.toggle('scrolled', window.scrollY > 20);
      backToTop.classList.toggle('show', window.scrollY > 600);
    }, { passive: true });
 
    /* ── Back to Top ── */
    backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
 
    /* ── Hamburger Menu ── */
    const hamburger = document.getElementById('hamburger');
    const navLinksEl = document.querySelector('.nav-links');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      navLinksEl.classList.toggle('open');
    });
    navLinksEl.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        hamburger.classList.remove('open');
        navLinksEl.classList.remove('open');
      });
    });
 
    /* ── Stat Counter Animation ── */
    function animateCounter(el) {
      const target = parseInt(el.dataset.target);
      const suffix = el.dataset.suffix || '';
      const duration = 1600;
      const start = performance.now();
      function tick(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.floor(eased * target) + suffix;
        if (progress < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }
    const statObserver = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          animateCounter(e.target);
          statObserver.unobserve(e.target);
        }
      });
    }, { threshold: 0.5 });
    document.querySelectorAll('.stat-value[data-target]').forEach(el => statObserver.observe(el));
 
    /* ── Iframe Loading State ── */
    const agentIframe = document.getElementById('agent-iframe');
    const frameLoading = document.getElementById('frame-loading');
    if (agentIframe && frameLoading) {
      agentIframe.addEventListener('load', () => frameLoading.classList.add('hidden'));
      setTimeout(() => frameLoading.classList.add('hidden'), 8000);
